# ─── CannaRoute — Render Blueprint ────────────────────────────────────────────
# Deploys the full CannaRoute stack:
#   • 1 Postgres database  (shared by all 7 services)
#   • 1 Redis instance     (GPS pub/sub + caching)
#   • 7 NestJS web services
#
# One-time setup after first deploy:
#   1. Set all env vars marked sync:false in the Render dashboard
#   2. Seed Michigan compliance data:
#        psql $DATABASE_URL < database/seed.sql
#   3. Once schema is stable, set DB_SYNC=false on all services
#        to prevent accidental schema changes in production.
#
# Estimated cost: ~$60-70/month on Render Pro
#   Postgres Starter: ~$7/mo  |  Redis Starter: ~$7/mo
#   7 × Web Starter:  ~$7/mo each → $49/mo
# ──────────────────────────────────────────────────────────────────────────────

databases:
  - name: cannaroute-db
    databaseName: cannaroute_dev
    user: cannaroute
    plan: free

services:

  # ─── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: cannaroute-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  # ─── Auth Service ──────────────────────────────────────────────────────────
  - type: web
    name: cannaroute-auth
    env: docker
    dockerfilePath: ./backend/services/auth/Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/v1/health
    autoDeploy: true
    buildFilter:
      paths:
        - backend/shared/**
        - backend/services/auth/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_SYNC
        value: "true"
      - key: DB_HOST
        fromDatabase:
          name: cannaroute-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cannaroute-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: cannaroute-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cannaroute-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: cannaroute-db
          property: database
      - key: REDIS_HOST
        fromService:
          type: redis
          name: cannaroute-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: cannaroute-redis
          property: port
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false

  # ─── Order Service ──────────────────────────────────────────────────────────
