      - key: DB_USER
        fromDatabase:
          name: cannaroute-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: cannaroute-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: cannaroute-db
          property: database
      - key: REDIS_HOST
        fromService:
          type: redis
          name: cannaroute-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: cannaroute-redis
          property: port
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: INVENTORY_SERVICE_URL
        value: "http://cannaroute-inventory:10000"
      - key: COMPLIANCE_SERVICE_URL
        value: "http://cannaroute-compliance:10000"
      - key: NOTIFICATION_SERVICE_URL
        value: "http://cannaroute-notification:10000"
      - key: DELIVERY_SERVICE_URL
        value: "http://cannaroute-delivery:10000"

